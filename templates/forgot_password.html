<!DOCTYPE html>
<html>
<head>
<title>Forgot Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

{% load static %}

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Poppins',sans-serif;

    background: linear-gradient(135deg,#0f172a,#1e293b);
}

.card{
    width:350px;
    background:rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    color:white;
}

.logo{
    font-size:28px;
    margin-bottom:10px;
}

.title{
    font-size:20px;
    font-weight:600;
    margin-bottom:5px;
}

.subtitle{
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:20px;
}

.input-box{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#e2e8f0;
    font-size:14px;
}

.btn{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
    border:none;
    border-radius:10px;
    font-size:15px;
    cursor:pointer;
}

.btn:hover{
    opacity:0.9;
}

.back{
    margin-top:15px;
    font-size:13px;
}

.back a{
    color:#38bdf8;
    text-decoration:none;
}

.alert{
    background:#22c55e;
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    font-size:13px;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">🔐</div>

<div class="title">Forgot Password</div>
<div class="subtitle">Enter your username to receive OTP</div>

{% if messages %}
    {% for message in messages %}
        <div class="alert">{{ message }}</div>
    {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Enter Username" class="input-box" required>

<button type="submit" class="btn">Send OTP</button>

</form>

<div class="back">
    <a href="/login/">← Back to Login</a>
</div>

</div>

</body>
</html>
